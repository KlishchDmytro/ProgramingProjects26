<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>

    <style>

        body{
            margin:0px;
            padding: 0px;
            background-color: #0d1b2a;

            color:#e0e1dd;
        }

        .conteiner{
            width: 80vw;
            min-height: 100vh;
            display: inline-flex;
            flex-direction: column;
            place-items: center;
            background-color:#1b263b;
            box-shadow: 0px 0px 20px #1b263b ;

            position: absolute;
            left:10vw;
        }


        .gameSelect{
            width: 95%;
            min-height: 25vh;

            /* padding: 3%; */

            background-color: #0d1b2a;
            border-radius: 5px;
            display:flex;
        }

        .box {
            background-color: #415a77;
            border-radius: 10px;
            height: 150px;
            width: 300px;

            margin: 3%;

            display: grid;
            place-items: center;

            font-size: 36px;

            transition: all 0.3s ease-in-out;
        }

        .box:hover{
            /* transform: translate(-5px,-5px); */
            transform: scale(1.1);
        }

        .box:nth-child(1){
            position:absolute;
            left: 200px;
        }

        .box:nth-child(2){
            position:absolute;
            right: 200px;
        }

        a{
            color:#e0e1dd;
            text-decoration: none;
        }


        .header{
            font-size: 40px;
        }



    </style>
</head>
<body>

        <div class="conteiner">

        <div class="header">
            <p>Game from two AI agent</p>
            <p><b>GPT chat</b> VS <b>Copilot</b></p>
        </div>

        <div class="gameSelect">
            <div class="box"><a href="GameGPT/gameGPT.html">GPT Game</a></div>
            <div class="box"><a href="GameCopilot/gameCopilot.html">Copilot Game</a></div>
        </div>


        </div>
        
    
</body>
</html>
